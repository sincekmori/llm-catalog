# Example catalog.yaml for llm-catalog.
#
# PLACEHOLDERS ONLY. Every value here is a dummy. Real base URLs, real model
# ids, and real capability values are confidential "data" that belong in your
# private environment — never commit them to this (public) repository. Secrets
# (API keys) live in environment variables; this file stores only the *name* of
# the env var via `apiKeyEnvVarName`.
#
# The structure mirrors ai-sdk-catalog: camelCase keys (baseURL,
# apiKeyEnvVarName, pathTemplate, actionMap) are accepted as-is.

providers:
  - id: examplegw # any gateway identifier; also the LiteLLM custom provider name
    gateway:
      baseURL: https://gateway.example.invalid/base # dummy
      apiKeyEnvVarName: EXAMPLEGW_API_KEY # env var *name* (the value lives in env)
      backends:
        anthropic:
          pathTemplate: "anthropic/{slug}" # gateway path shape; {slug}=model, {action}=op
        openai:
          pathTemplate: "gpt/{slug}"
        google:
          pathTemplate: "gemini/{slug}:{action}"
          actionMap:
            streamGenerateContent: customStreamGenerateContent
    settings: # provider-level call defaults (optional)
      temperature: 0
    models:
      - id: light-anthropic
        backend: anthropic
        capabilities: # Python-side hints (optional, namespaced)
          structured_output: tool # native | tool | prompted
          multi_step_tools: true
          grounding: []
      - id: light-openai
        backend: openai
        slug: light-openai # path slug (defaults to id)
        api: chat # chat | responses (openai backend only)
        capabilities:
          structured_output: native
      - id: search-google
        backend: google
        capabilities:
          multi_step_tools: false # e.g. this backend has no multi-step tool loop
          grounding: [web_search, url_context, code_execution]

# Apps reference roles, never raw model names.
roles:
  fast: { provider: examplegw, model: light-openai }
  reasoning: { provider: examplegw, model: light-anthropic }
  search: { provider: examplegw, model: search-google }
