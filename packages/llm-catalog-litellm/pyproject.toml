[project]
name = "llm-catalog-litellm"
version = "0.1.0"
description = "LiteLLM CustomLLM plugin for llm-catalog: drive a catalog.yaml through LiteLLM, in-process or via the proxy config.yaml."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Shinsuke Mori" }]
keywords = ["llm", "catalog", "litellm", "gateway", "proxy"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = [
    "llm-catalog-core>=0.1,<0.2",
    # Floor at the verified version (also past the 1.82.7/1.82.8 supply-chain incident).
    "litellm>=1.90.0",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/sincekmori/llm-catalog"
Repository = "https://github.com/sincekmori/llm-catalog"
Issues = "https://github.com/sincekmori/llm-catalog/issues"
Changelog = "https://github.com/sincekmori/llm-catalog/blob/main/packages/llm-catalog-litellm/CHANGELOG.md"

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "llm_catalog.litellm"
namespace = true
