[project]
name = "llm-catalog-pydantic-ai"
version = "0.2.0"
description = "Pydantic AI adapter for llm-catalog: build native Pydantic AI models from a catalog.yaml, routed through your gateway."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "Shinsuke Mori" }]
keywords = ["llm", "catalog", "pydantic-ai", "gateway"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Typing :: Typed",
]
dependencies = [
    "llm-catalog-core>=0.1,<0.2",
    # The adapter targets the Pydantic AI 2.x API (NativeOutput / OpenAIChatModel
    # / native_tools, ...); it does not work on the old 0.x line.
    "pydantic-ai>=2.0",
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/sincekmori/llm-catalog"
Repository = "https://github.com/sincekmori/llm-catalog"
Issues = "https://github.com/sincekmori/llm-catalog/issues"
Changelog = "https://github.com/sincekmori/llm-catalog/blob/main/packages/llm-catalog-pydantic-ai/CHANGELOG.md"

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "llm_catalog.pydantic_ai"
namespace = true
