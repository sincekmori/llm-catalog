# Keep GitHub Actions and Python dependencies current automatically, so versions
# don't silently fall behind. Dependabot opens weekly update PRs; CI gates them.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
