name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (ty, strict)
        run: uv run ty check packages

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every currently-supported CPython (matches requires-python >=3.10).
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --frozen --python ${{ matrix.python }}
      - name: Tests (mock only)
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - run: uv python install 3.14
      - name: Build all distributions
        run: uv build --all-packages --out-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
